<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Voice Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Используем последнюю стабильную версию PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-96 text-center border border-slate-700">
        <h1 class="text-xl font-bold mb-4">Voice Chat</h1>
        
        <div class="mb-6 bg-slate-950 p-4 rounded-xl border border-slate-700">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Ваш ID</p>
            <code id="my-id" class="text-blue-400 font-mono text-xl select-all">Инициализация...</code>
        </div>

        <input id="peer-id" placeholder="ID друга" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-blue-500">
        
        <button onclick="startCall()" id="callBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold transition">
            Позвонить
        </button>

        <p id="status" class="mt-4 text-xs text-slate-400"></p>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        const status = document.getElementById('status');
        
        // Явно указываем настройки сервера
        const peer = new Peer(undefined, {
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            path: '/'
        });

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            status.innerText = "Готов к работе";
        });

        peer.on('error', err => {
            status.innerText = "Ошибка: " + err.type;
            console.error(err);
        });

        let localStream;
        
        // Сразу запрашиваем микрофон при загрузке
        navigator.mediaDevices.getUserMedia({ video: false, audio: true })
            .then(stream => { localStream = stream; })
            .catch(err => { status.innerText = "Ошибка микрофона: " + err.message; });

        peer.on('call', call => {
            call.answer(localStream);
            status.innerText = "Входящий вызов...";
            call.on('stream', stream => {
                document.getElementById('remoteAudio').srcObject = stream;
                status.innerText = "Разговор идет";
            });
        });

        function startCall() {
            const peerId = document.getElementById('peer-id').value;
            if (!peerId) return alert("Введите ID");
            
            const call = peer.call(peerId, localStream);
            status.innerText = "Вызов...";
            call.on('stream', stream => {
                document.getElementById('remoteAudio').srcObject = stream;
                status.innerText = "Разговор идет";
            });
        }
    </script>
</body>
</html>
