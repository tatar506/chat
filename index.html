<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Voice Call</title>
    <!-- Используем CDN, это нормально для теста -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="bg-gray-800 p-6 rounded-2xl w-80 text-center">
        <h2 class="text-xl font-bold mb-4">Звонок</h2>
        <div id="my-id" class="text-blue-400 font-mono mb-4 text-sm break-all">Подключение...</div>
        <input id="peer-id" placeholder="ID друга" class="w-full bg-gray-700 p-2 rounded mb-4 text-white">
        <button onclick="startCall()" class="w-full bg-blue-600 py-2 rounded">Позвонить</button>
        <p id="status" class="mt-4 text-xs text-gray-400"></p>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        const status = document.getElementById('status');
        
        // ВНИМАНИЕ: Впиши сюда ТОЛЬКО домен!
        const peer = new Peer(undefined, {
            host: 'chat-xgeu.onrender.com',
            port: 443,
            secure: true,
            path: '/'
        });

        let localStream;
        navigator.mediaDevices.getUserMedia({ audio: true }).then(s => localStream = s);

        peer.on('open', id => document.getElementById('my-id').innerText = "ID: " + id);
        
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => document.getElementById('remoteAudio').srcObject = s);
            status.innerText = "Разговор...";
        });

        function startCall() {
            const id = document.getElementById('peer-id').value;
            const call = peer.call(id, localStream);
            call.on('stream', s => document.getElementById('remoteAudio').srcObject = s);
            status.innerText = "Звоним...";
        }
    </script>
</body>
</html>
