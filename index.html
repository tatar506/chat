<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-96 text-center border border-slate-700">
        <h1 class="text-2xl font-bold mb-6">Аудио Звонок</h1>
        
        <div class="mb-6 bg-slate-900 p-4 rounded-xl border border-slate-700">
            <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Ваш ID</p>
            <code id="my-id" class="text-blue-400 font-mono text-lg">Загрузка...</code>
        </div>

        <input id="peer-id" placeholder="ID собеседника" 
               class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-blue-500 transition">
        
        <button onclick="startCall()" 
                class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold transition transform active:scale-95">
            Позвонить
        </button>

        <div id="status" class="mt-6 text-sm text-slate-400">Ожидание...</div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        const peer = new Peer();
        const status = document.getElementById('status');
        
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Получаем доступ только к микрофону
        navigator.mediaDevices.getUserMedia({ video: false, audio: true }).then(stream => {
            peer.on('call', call => {
                call.answer(stream);
                status.innerText = "Разговор идет...";
                call.on('stream', remoteStream => {
                    const audio = document.getElementById('remoteAudio');
                    audio.srcObject = remoteStream;
                });
            });
        });

        function startCall() {
            const peerId = document.getElementById('peer-id').value;
            if (!peerId) return alert("Введите ID");
            
            navigator.mediaDevices.getUserMedia({ video: false, audio: true }).then(stream => {
                const call = peer.call(peerId, stream);
                status.innerText = "Звоним...";
                call.on('stream', remoteStream => {
                    const audio = document.getElementById('remoteAudio');
                    audio.srcObject = remoteStream;
                    status.innerText = "Разговор идет...";
                });
            });
        }
    </script>
</body>
</html>
